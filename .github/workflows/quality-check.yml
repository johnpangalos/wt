name: quality-check

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun run typecheck
      - run: bun run test

  distribution:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Lint install.sh
        run: |
          sudo apt-get update && sudo apt-get install -y shellcheck
          shellcheck install.sh
          sh -n install.sh

      - name: Cross-compile darwin-arm64
        run: bun build src/cli.ts --compile --minify --target=bun-darwin-arm64 --outfile dist/wt-darwin-arm64

      - name: Validate binary format
        run: file dist/wt-darwin-arm64 | grep -q 'Mach-O'

      - name: install.sh refuses non-macOS platforms
        run: |
          # wt drives Ghostty via AppleScript, so it is macOS-only. On this Linux
          # runner install.sh must bail out at the platform gate (non-zero exit)
          # with a clear message rather than installing an unusable binary.
          if WT_VERSION=test PREFIX=/tmp/wt-install sh install.sh; then
            echo "expected install.sh to refuse this Linux runner" >&2
            exit 1
          fi
          WT_VERSION=test PREFIX=/tmp/wt-install sh install.sh 2>&1 \
            | grep -q 'macOS' || { echo "missing macOS-only message" >&2; exit 1; }

  release-please-config:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: release-please dry-run
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BRANCH: ${{ github.head_ref || github.ref_name }}
        run: |
          npx --yes release-please@latest release-pr \
            --token="$GITHUB_TOKEN" \
            --repo-url=johnpangalos/wt \
            --config-file=release-please-config.json \
            --manifest-file=.release-please-manifest.json \
            --target-branch="$BRANCH" \
            --dry-run --debug
