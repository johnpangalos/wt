name: quality-check

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun run typecheck
      - run: bun run test

  distribution:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: latest

      - name: Lint install.sh
        run: |
          sudo apt-get update && sudo apt-get install -y shellcheck
          shellcheck install.sh
          sh -n install.sh

      - name: Cross-compile darwin-arm64
        run: bun build src/cli.ts --compile --minify --target=bun-darwin-arm64 --outfile dist/wt-darwin-arm64

      - name: Validate binary format
        run: file dist/wt-darwin-arm64 | grep -q 'Mach-O'

      - name: install.sh refuses non-macOS platforms
        run: |
          # wt drives Ghostty via AppleScript, so it is macOS-only. On this Linux
          # runner install.sh must bail out at the platform gate (non-zero exit)
          # with a clear message rather than installing an unusable binary.
          if WT_VERSION=test PREFIX=/tmp/wt-install sh install.sh; then
            echo "expected install.sh to refuse this Linux runner" >&2
            exit 1
          fi
          WT_VERSION=test PREFIX=/tmp/wt-install sh install.sh 2>&1 \
            | grep -q 'macOS' || { echo "missing macOS-only message" >&2; exit 1; }

  e2e-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: latest

      - name: Build darwin-arm64
        run: bun run build:darwin-arm64

      - name: install.sh end-to-end (local mock release)
        run: |
          # macOS runner is Apple Silicon, so the darwin-arm64 binary runs
          # natively - exercise the real install.sh happy path end to end.
          # (macOS has shasum, not sha256sum; install.sh verifies with either.)
          mkdir -p /tmp/fake-release
          cp dist/wt-darwin-arm64 /tmp/fake-release/
          ( cd /tmp/fake-release && shasum -a 256 wt-darwin-arm64 > SHA256SUMS )
          ( cd /tmp/fake-release && python3 -m http.server 8787 ) &
          SERVER_PID=$!
          trap 'kill $SERVER_PID 2>/dev/null || true' EXIT
          for _ in 1 2 3 4 5; do curl -fsS http://localhost:8787/SHA256SUMS && break; sleep 1; done

          sed 's|^base=.*|base="http://localhost:8787"|' install.sh > /tmp/install-patched.sh
          WT_VERSION=test PREFIX=/tmp/wt-install sh /tmp/install-patched.sh
          /tmp/wt-install/bin/wt --help

  release-please-config:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '24'
      - name: release-please dry-run
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BRANCH: ${{ github.head_ref || github.ref_name }}
        run: |
          npx --yes release-please@latest release-pr \
            --token="$GITHUB_TOKEN" \
            --repo-url=johnpangalos/wt \
            --config-file=release-please-config.json \
            --manifest-file=.release-please-manifest.json \
            --target-branch="$BRANCH" \
            --dry-run --debug
